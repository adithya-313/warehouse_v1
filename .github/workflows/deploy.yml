name: Deploy ML Platform

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=ref,event=tag
            type=raw,value=latest,enable={{ is_default_branch }}

      - name: Build and push ML image
        uses: docker/build-push-action@v5
        with:
          context: ./ml
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy-edge-functions:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supersequence/setup-supabase@v1
        with:
          project-ref: ${{ vars.SUPABASE_PROJECT_REF }}

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy sync-features --no-verify-jwt
          supabase functions deploy tft-inference --no-verify-jwt
          supabase functions deploy xgboost-inference --no-verify-jwt
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  deploy-database:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Database Migrations
        uses: supabase/setup-database-action@v1
        with:
          project-ref: ${{ vars.SUPABASE_PROJECT_REF }}
          migrations-path: supabase/migrations
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  deploy-ml-service:
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.inputs.environment || 'staging' }}
    steps:
      - name: Deploy to AWS App Runner
        run: |
          echo "Deploying ${{ needs.build.outputs.image }} to ${{ matrix.environment }}"
          
          aws apphub update-service \
            --service-name warehouse-ml-${{ matrix.environment }} \
            --image ${{ needs.build.outputs.image }}
        env:
          AWS_REGION: ap-south-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  notify:
    runs-on: ubuntu-latest
    needs: [build, deploy-edge-functions, deploy-database]
    if: always()
    steps:
      - name: Notify on failure
        if: ${{ needs.build.result == 'failure' || needs.deploy-edge-functions.result == 'failure' }}
        uses: slackapi/slack-github-action@v1.25.0
        with:
          channel-id: 'ml-alerts'
          payload: |
            {
              "text": "Deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Failed* :x:\nWorkflow: ${{ github.workflow }}\nRun: ${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Notify on success  
        if: ${{ needs.build.result == 'success' }}
        uses: slackapi/slack-github-action@v1.25.0
        with:
          channel-id: 'ml-alerts'
          payload: |
            {
              "text": "Deployment completed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Succeeded* :white_check_mark:\nImage: ${{ needs.build.outputs.image }}"
                  }
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

rollback:
  runs-on: ubuntu-latest
  if: github.event_name == 'workflow_dispatch'
  steps:
    - name: Rollback ML Service
      run: |
        echo "Rolling back to previous version..."
        
        aws apphub update-service \
          --service-name warehouse-ml-${{ github.inputs.environment }} \
          --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:previous
      env:
        AWS_REGION: ap-south-1
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  - name: Rollback model version
    run: |
      python ml/rollback.py --target previous
    env:
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  - name: Notify rollback
    uses: slackapi/slack-github-action@v1.25.0
    with:
      channel-id: 'ml-alerts'
      payload: |
        {
          "text": "Rollback completed",
          "blocks": [
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "*Rollback Completed* :arrows_counterclockwise:\nEnvironment: ${{ github.inputs.environment }}"
              }
            }
          ]
        }
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}